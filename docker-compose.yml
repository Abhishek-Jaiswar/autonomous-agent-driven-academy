version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: astralearn-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: astralearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: astralearn-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: astralearn-server
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:rootpassword@postgres:5432/astralearn?schema=public
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:3000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX:-astralearn}
      - JWT_SECRET=${JWT_SECRET:-super_secret_production_key_astralearn}
    depends_on:
      - postgres
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: astralearn-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - SERVER_URL=http://server:8000
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
